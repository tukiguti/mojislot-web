<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mojislot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="cabinet">
      <div id="masthead"><span class="mark">mojislot</span></div>
      <div class="header-shell">
        <header id="info-bar">
          <div id="coin-display">MEDAL 0</div>
          <div id="status-stack">
            <div id="effect-status">通常</div>
          </div>
          <div id="bet-display">
            <span id="bet-text">Bet: 3</span>
            <button id="auto-btn" type="button" title="オート [O]">AUTO</button>
            <button id="mute-btn" type="button" title="音量 [M]">♪</button>
            <button id="reel-strip-btn" type="button" title="リール配列 [R]">配列</button>
            <button id="zukan-btn" type="button" title="図鑑 [Z]">図鑑</button>
            <button id="settings-btn" type="button" title="設定 [,]">⚙</button>
          </div>
        </header>
      </div>

      <div id="game-area">
        <canvas id="game"></canvas>
        <!-- 進行ステータスは演出液晶の左上に出す（ヘッダーを溢れさせない） -->
        <div id="lcd-status">
          <div id="bonus-status" hidden></div>
          <div id="streak-status" hidden></div>
          <div id="rescue-status" hidden></div>
        </div>
        <div id="result-display"></div>
      </div>

      <div id="overlays">
        <div id="quiz-overlay" hidden></div>
        <div id="zukan-overlay" hidden></div>
        <div id="settings-overlay" hidden></div>
        <div id="bonus-banner" hidden></div>
      </div>

      <footer id="control-panel">
        <div class="ctrl-row">
          <button id="bet-btn" data-key="[B]">MAXBET</button>
          <button id="lever-btn" data-key="[Space]">LEVER</button>
        </div>
        <div class="ctrl-row stop-row" id="reel-buttons">
          <div class="stop-cell">
            <button class="stop-btn" data-reel="0" data-key="[A]">STOP</button>
          </div>
          <div class="stop-cell">
            <button class="stop-btn" data-reel="1" data-key="[S]">STOP</button>
          </div>
          <div class="stop-cell">
            <button class="stop-btn" data-reel="2" data-key="[D]">STOP</button>
          </div>
        </div>
        <div id="key-hint">Space:レバー  /  A・S・D:ストップ  /  B:BET  /  1〜4:クイズ</div>
      </footer>
    </div>

    <aside id="reel-strip-panel">
      <button class="strip-close" type="button" hidden>×</button>
      <h3>リール配列</h3>
      <div class="strip-grid">
        <div class="strip-column" data-reel="0">
          <h4>左</h4>
          <div class="cells"></div>
        </div>
        <div class="strip-column" data-reel="1">
          <h4>中</h4>
          <div class="cells"></div>
        </div>
        <div class="strip-column" data-reel="2">
          <h4>右</h4>
          <div class="cells"></div>
        </div>
      </div>
      <div class="strip-hint">停止時に中央セルをハイライトします</div>
    </aside>

    <aside id="unit-panel">
      <div class="unit-head">UNIT</div>
      <div class="unit-readout">
        <span class="unit-readout-label">持メダル</span>
        <span class="unit-readout-num" id="unit-medal">0</span>
      </div>
      <div class="unit-stat">
        <div class="unit-stat-row">
          <span class="unit-stat-label">差枚</span>
          <span class="unit-stat-num" id="unit-sahmai">0</span>
        </div>
        <div class="unit-stat-row">
          <span class="unit-stat-label">投資</span>
          <span class="unit-stat-num" id="unit-invest">0</span>
        </div>
      </div>
      <div class="unit-slot" aria-hidden="true"></div>
      <div class="unit-lend-label">メダル貸出</div>
      <div class="unit-lend-buttons">
        <button class="coin-add" data-amount="100" type="button">＋100</button>
        <button class="coin-add" data-amount="500" type="button">＋500</button>
        <button class="coin-add" data-amount="1000" type="button">＋1000</button>
        <button class="coin-add" data-amount="5000" type="button">＋5000</button>
      </div>
      <div class="unit-flow">
        <button id="count-btn" class="aux-btn" type="button" title="計数（この戦を締めて持メダルを流す）">計数</button>
      </div>
      <div class="unit-hint">貸出＝投資／計数＝締める</div>
    </aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
